<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ConnectCall</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#1a1d2e;--surface2:#252840;--accent:#6c63ff;--accent2:#48c9b0;--text:#e8eaf0;--muted:#8b8fa8;--danger:#e74c6c;--online:#2ecc71;--border:#2d3050}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
input{font-family:inherit}
input[type=text],input[type=password]{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1rem;outline:none;transition:border .2s}
input[type=text]:focus,input[type=password]:focus{border-color:var(--accent)}
.btn{padding:12px 20px;border-radius:10px;border:none;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#5a52e0}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-success{background:var(--accent2);color:#0f1117}.btn-success:hover{opacity:.85}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{opacity:.85}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:var(--border)}

/* JOIN */
#joinScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:24px;padding:20px}
.logo{font-size:2.4rem;font-weight:800;letter-spacing:-1px}
.logo span{color:var(--accent)}
.logo small{font-size:.9rem;color:var(--muted);font-weight:400;display:block;text-align:center;margin-top:4px}
.joinCard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:440px;display:flex;flex-direction:column;gap:18px}
.joinTabs{display:flex;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.joinTab{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s}
.joinTab.active{background:var(--accent);color:#fff}
.formGroup{display:flex;flex-direction:column;gap:8px}
.formGroup label{font-size:.78rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.pinWrap{position:relative}
.pinWrap input{padding-right:44px}
.pinToggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:4px}
.statusMsg{text-align:center;font-size:.85rem;min-height:1.2em}
.statusMsg.err{color:var(--danger)}
.statusMsg.ok{color:var(--accent2)}
.avatarPicker{display:flex;flex-wrap:wrap;gap:8px}
.avatarPicker label{cursor:pointer}
.avatarPicker input{display:none}
.avatarPicker .swatch{width:32px;height:32px;border-radius:50%;border:3px solid transparent;transition:.15s}
.avatarPicker input:checked+.swatch{border-color:#fff;transform:scale(1.15)}
.avatarEmoji{display:flex;flex-wrap:wrap;gap:6px}
.avatarEmoji label{cursor:pointer}
.avatarEmoji input{display:none}
.avatarEmoji .eopt{width:34px;height:34px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:.15s;background:var(--surface2)}
.avatarEmoji input:checked+.eopt{border-color:var(--accent)}
.avatarImgWrap{display:flex;align-items:center;gap:10px}
.avatarImgPreview{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--border);display:none}
.avatarImgPlaceholder{width:52px;height:52px;border-radius:50%;background:var(--surface2);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;flex-shrink:0}
.uploadBtn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:.82rem;cursor:pointer}
.uploadBtn:hover{background:var(--border)}
.autoLoginBanner{background:var(--surface2);border:1px solid var(--accent);border-radius:12px;padding:14px;display:none;flex-direction:column;gap:10px}
.autoLoginBanner.active{display:flex}
.autoLoginBanner p{font-size:.88rem;color:var(--muted)}
.autoLoginBanner strong{color:var(--text)}
.autoLoginBanner .row{display:flex;gap:8px}
.autoLoginBanner .btn{flex:1;padding:10px;font-size:.85rem}

/* MAIN */
#mainApp{display:none;height:100vh;flex-direction:column}
.topBar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topBar .logo{font-size:1.4rem}
.userBadge{display:flex;align-items:center;gap:8px;font-size:.9rem;background:var(--surface2);padding:6px 12px;border-radius:20px;cursor:pointer;transition:.2s}
.userBadge:hover{background:var(--border)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--online);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.appBody{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sideSection{padding:16px;border-bottom:1px solid var(--border)}
.sideSection h3{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px}
.onlineList{display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 80px);overflow-y:auto}
.onlineUser{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;background:var(--surface2)}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.uinfo{flex:1;min-width:0}
.uname{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ustatus{font-size:.7rem;color:var(--muted)}
.callBtn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:.75rem;cursor:pointer;flex-shrink:0}
.callBtn:hover{background:#5a52e0}
.youTag{font-size:.7rem;color:var(--accent2);background:rgba(72,201,176,.15);padding:2px 8px;border-radius:4px;flex-shrink:0}
.emptyState{text-align:center;color:var(--muted);font-size:.85rem;padding:24px 0;line-height:1.9}

/* CHAT */
.mainContent{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chatHeader{padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);font-weight:600;display:flex;align-items:center;gap:8px;flex-shrink:0}
.unreadBadge{background:var(--danger);color:#fff;font-size:.7rem;padding:1px 7px;border-radius:10px;font-weight:700;display:none}
.chatMessages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chatMessages::-webkit-scrollbar{width:4px}
.chatMessages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.message{display:flex;gap:10px;max-width:82%;position:relative}
.message.mine{align-self:flex-end;flex-direction:row-reverse}
.message .avatar{width:30px;height:30px;font-size:.85rem;flex-shrink:0;align-self:flex-end}
.msgBubble{padding:10px 14px;border-radius:16px;font-size:.9rem;line-height:1.5;word-break:break-word;position:relative}
.message:not(.mine) .msgBubble{background:var(--surface2);border-bottom-left-radius:4px}
.message.mine .msgBubble{background:var(--accent);border-bottom-right-radius:4px}
.msgBubble img{max-width:220px;max-height:220px;border-radius:10px;display:block;margin-top:4px;cursor:pointer}
.msgMeta{font-size:.7rem;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:6px}
.message.mine .msgMeta{justify-content:flex-end}
.deleteBtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75rem;padding:0 2px;opacity:0;transition:.15s}
.message:hover .deleteBtn{opacity:1}
.deleteBtn:hover{color:var(--danger)}
.deletedMsg{font-style:italic;color:var(--muted);font-size:.85rem}
.systemMsg{text-align:center;font-size:.8rem;color:var(--muted);padding:4px 0}
.typingIndicator{font-size:.8rem;color:var(--muted);padding:2px 20px;min-height:1.3em;font-style:italic}
.chatInputRow{border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.imgPreviewBar{display:none;padding:10px 20px 0;gap:8px;align-items:center}
.imgPreviewBar.active{display:flex}
.imgPreviewThumb{width:56px;height:56px;border-radius:8px;object-fit:cover;border:2px solid var(--accent)}
.removeBtn{background:var(--danger);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chatInputMain{display:flex;gap:10px;padding:14px 20px}
.chatInputMain input{flex:1}
.iconBtn{width:42px;height:42px;border-radius:10px;border:none;background:var(--surface2);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.iconBtn:hover{background:var(--border)}

/* IMAGE OVERLAY */
#imgOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;align-items:center;justify-content:center;cursor:zoom-out}
#imgOverlay.active{display:flex}
#imgOverlay img{max-width:92vw;max-height:92vh;border-radius:12px}

/* VIDEO */
#videoModal{display:none;position:fixed;inset:0;background:#0a0b10;z-index:100;flex-direction:row}
#videoModal.active{display:flex}
.videoMain{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;position:relative}
.videoGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:960px}
.videoBox{background:var(--surface);border-radius:14px;overflow:hidden;aspect-ratio:16/9;position:relative;border:2px solid var(--border)}
.videoBox video{width:100%;height:100%;object-fit:cover}
.videoBox.screen-share{border-color:var(--accent2)}
.videoLabel{position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,.65);padding:3px 10px;border-radius:20px;font-size:.78rem}
.videoControls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
.ctrlBtn{width:50px;height:50px;border-radius:50%;border:none;font-size:1.2rem;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center}
.ctrlBtn.on{background:var(--surface2);color:var(--text)}
.ctrlBtn.off{background:#3a1a1a;color:var(--danger)}
.ctrlBtn.end{background:var(--danger);color:#fff;width:58px;height:58px;font-size:1.4rem}
.ctrlBtn.active{background:var(--accent2);color:#0f1117}
.ctrlBtn:hover{transform:scale(1.08)}
.callStatus{font-size:.82rem;color:var(--muted);position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);padding:4px 14px;border-radius:20px;white-space:nowrap}
.callDuration{position:absolute;top:14px;right:20px;font-size:.8rem;color:var(--accent2);background:rgba(0,0,0,.5);padding:4px 12px;border-radius:20px}
.emojiPickerWrap{position:relative}
.emojiPicker{position:absolute;bottom:64px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px;display:none;gap:6px;flex-wrap:wrap;width:230px;z-index:10;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.emojiPicker.open{display:flex}
.emojiPicker button{background:none;border:none;font-size:1.6rem;cursor:pointer;border-radius:8px;padding:4px;transition:.15s;line-height:1;user-select:none}
.emojiPicker button:hover{background:var(--surface2)}
.reaction{position:fixed;pointer-events:none;z-index:300;animation:floatUp 2s ease forwards;display:flex;flex-direction:column;align-items:center;gap:2px}
.reaction .emoji{font-size:2.8rem;line-height:1}
.reaction .rname{font-size:.65rem;color:#fff;background:rgba(0,0,0,.55);padding:1px 6px;border-radius:8px;white-space:nowrap}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-100px) scale(1.3)}100%{opacity:0;transform:translateY(-150px) scale(1)}}
.callChatPanel{width:300px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.callChatPanel h4{padding:14px 16px;font-size:.85rem;font-weight:700;border-bottom:1px solid var(--border);flex-shrink:0;color:var(--accent2)}
.callChatMsgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.callChatMsgs::-webkit-scrollbar{width:3px}
.callChatMsgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.callMsg{background:var(--surface2);border-radius:10px;padding:8px 10px;font-size:.82rem;line-height:1.4;word-break:break-word}
.callMsg.mine{background:var(--accent);align-self:flex-end}
.callMsg .cmName{font-size:.7rem;color:var(--accent2);margin-bottom:3px;font-weight:600}
.callMsg.mine .cmName{display:none}
.callChatTyping{font-size:.75rem;color:var(--muted);padding:2px 12px;font-style:italic;min-height:1.3em}
.callChatInput{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border);flex-shrink:0}
.callChatInput input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.85rem;outline:none}
.callChatInput input:focus{border-color:var(--accent)}
.callChatInput button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:.85rem;font-weight:600}

/* PROFILE MODAL */
#profileModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;align-items:center;justify-content:center;padding:20px}
#profileModal.active{display:flex}
.profileCard{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:440px;display:flex;flex-direction:column;gap:18px;max-height:90vh;overflow-y:auto}
.profileCard h3{font-size:1.2rem;font-weight:700}
.profilePreview{display:flex;align-items:center;gap:16px;background:var(--surface2);padding:16px;border-radius:12px}
.profilePreview .bigAvatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;overflow:hidden}
.profilePreview .previewName{font-size:1.1rem;font-weight:700}
.profilePreview .previewSub{font-size:.8rem;color:var(--muted)}
.profileActions{display:flex;gap:10px}
.profileActions .btn{flex:1;padding:10px}

/* INCOMING */
#incomingCall{display:none;position:fixed;bottom:24px;right:24px;z-index:200;background:var(--surface);border:1px solid var(--accent);border-radius:16px;padding:20px;min-width:260px;box-shadow:0 8px 32px rgba(108,99,255,.3);animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
#incomingCall.active{display:block}
#incomingCall h4{margin-bottom:6px}
#incomingCall p{color:var(--muted);font-size:.85rem;margin-bottom:14px}
#incomingCall .btns{display:flex;gap:10px}
#incomingCall .btns .btn{flex:1;padding:10px}

/* DELETE CONFIRM */
#deleteConfirm{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center}
#deleteConfirm.active{display:flex}
.deleteCard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:16px;text-align:center}
.deleteCard h4{font-size:1.1rem}
.deleteCard p{color:var(--muted);font-size:.88rem}
.deleteCard .btns{display:flex;gap:10px}
.deleteCard .btns .btn{flex:1;padding:10px}

.c0{background:#6c63ff}.c1{background:#e74c6c}.c2{background:#48c9b0}.c3{background:#f39c12}
.c4{background:#9b59b6}.c5{background:#1abc9c}.c6{background:#e67e22}.c7{background:#3498db}
@media(max-width:768px){.sidebar{display:none}.callChatPanel{display:none}.videoGrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="imgOverlay" onclick="this.classList.remove('active')"><img id="overlayImg" src=""></div>

<!-- DELETE CONFIRM -->
<div id="deleteConfirm">
  <div class="deleteCard">
    <h4>🗑️ メッセージを削除</h4>
    <p>このメッセージを削除しますか？<br>全員の画面から消えます。</p>
    <div class="btns">
      <button class="btn btn-ghost" onclick="closeDeleteConfirm()">キャンセル</button>
      <button class="btn btn-danger" onclick="confirmDelete()">削除</button>
    </div>
  </div>
</div>

<!-- JOIN -->
<div id="joinScreen">
  <div class="logo">Connect<span>Call</span><small>世界中の人とリアルタイム通話</small></div>
  <div class="joinCard">
    <!-- 自動ログインバナー -->
    <div class="autoLoginBanner" id="autoLoginBanner">
      <p>前回のアカウントが見つかりました<br><strong id="autoLoginName"></strong> として続けますか？</p>
      <div class="row">
        <button class="btn btn-primary" onclick="autoLogin()">このアカウントでログイン</button>
        <button class="btn btn-ghost" onclick="dismissAutoLogin()">別のアカウント</button>
      </div>
    </div>
    <div class="joinTabs" id="joinTabs">
      <button class="joinTab active" onclick="switchTab('login')">ログイン</button>
      <button class="joinTab" onclick="switchTab('register')">新規登録</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" onsubmit="doLogin(event)" autocomplete="on" style="display:flex;flex-direction:column;gap:16px">
      <input type="text" name="username" id="loginName" placeholder="ニックネーム" autocomplete="username" required>
      <div class="pinWrap">
        <input type="password" name="password" id="loginPin" placeholder="4桁PIN" autocomplete="current-password" maxlength="4" pattern="[0-9]{4}" inputmode="numeric" required>
        <button type="button" class="pinToggle" onclick="togglePin('loginPin',this)">👁</button>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">ログイン</button>
      <div class="statusMsg" id="loginStatus"></div>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" onsubmit="doRegister(event)" autocomplete="on" style="display:none;flex-direction:column;gap:16px">
      <div class="formGroup">
        <label>ニックネーム</label>
        <input type="text" name="username" id="regName" placeholder="例：田中太郎" maxlength="20" autocomplete="username" required>
      </div>
      <div class="formGroup">
        <label>4桁PINコード（再ログイン用）</label>
        <div class="pinWrap">
          <input type="password" name="password" id="regPin" placeholder="0000〜9999" maxlength="4" pattern="[0-9]{4}" inputmode="numeric" autocomplete="new-password" required>
          <button type="button" class="pinToggle" onclick="togglePin('regPin',this)">👁</button>
        </div>
      </div>
      <div class="formGroup">
        <label>アイコン画像（任意）</label>
        <div class="avatarImgWrap">
          <div class="avatarImgPlaceholder" id="joinImgPlaceholder" onclick="document.getElementById('joinAvatarFile').click()">📷</div>
          <img class="avatarImgPreview" id="joinAvatarPreview">
          <div style="display:flex;flex-direction:column;gap:6px">
            <button type="button" class="uploadBtn" onclick="document.getElementById('joinAvatarFile').click()">画像を選択</button>
            <button type="button" class="uploadBtn" id="joinClearImg" style="display:none" onclick="clearJoinAvatar()">削除</button>
          </div>
          <input type="file" id="joinAvatarFile" accept="image/*" style="display:none" onchange="onJoinAvatarChange(event)">
        </div>
      </div>
      <div class="formGroup">
        <label>アイコンの色</label>
        <div class="avatarPicker" id="colorPicker"></div>
      </div>
      <div class="formGroup">
        <label>アイコン絵文字（任意）</label>
        <div class="avatarEmoji" id="emojiIconPicker"></div>
      </div>
      <button type="submit" class="btn btn-primary" id="regBtn">登録して参加</button>
      <div class="statusMsg" id="regStatus"></div>
    </form>
  </div>
</div>

<!-- MAIN -->
<div id="mainApp">
  <div class="topBar">
    <div class="logo" style="font-size:1.4rem">Connect<span>Call</span></div>
    <div class="userBadge" onclick="openProfile()" title="プロフィール編集">
      <span class="dot"></span>
      <div id="topAvatar" class="avatar" style="width:24px;height:24px;font-size:.7rem"></div>
      <span id="topName"></span>
      <span style="font-size:.75rem;color:var(--muted)">✏️</span>
    </div>
  </div>
  <div class="appBody">
    <div class="sidebar">
      <div class="sideSection">
        <h3>🟢 オンライン <span id="onlineCount">0</span>人</h3>
        <div class="onlineList" id="onlineList"><div class="emptyState">読み込み中...</div></div>
      </div>
    </div>
    <div class="mainContent">
      <div class="chatHeader">
        💬 グローバルチャット
        <span style="font-size:.75rem;color:var(--muted);font-weight:400;flex:1">— オンライン全員と</span>
        <span class="unreadBadge" id="unreadBadge">0</span>
      </div>
      <div class="chatMessages" id="chatMessages"></div>
      <div class="typingIndicator" id="typingIndicator"></div>
      <div class="chatInputRow">
        <div class="imgPreviewBar" id="imgPreviewBar">
          <img id="imgPreviewThumb" class="imgPreviewThumb" src="">
          <button class="removeBtn" onclick="clearPendingImg()">✕</button>
          <span style="font-size:.8rem;color:var(--muted)">画像を送信</span>
        </div>
        <div class="chatInputMain">

function resizeImage(file,maxSize,cb){

}

// ===== PEER =====
function initPeer(idx){
  const cfg=PEER_CONFIGS[idx];
  peer=cfg?new Peer(cfg):new Peer();
  peer.on('open',async id=>{
    myPeerId=id;
    addSys('✅ 接続完了！世界中のユーザーとつながれます');
    await registerMe();await fetchLobby();await fetchMessages();
    heartbeatTimer=setInterval(registerMe,8000);
    refreshTimer=setInterval(fetchLobby,6000);
    msgTimer=setInterval(fetchMessages,4000);
  });
  peer.on('connection',conn=>{setupConn(conn);conn.on('open',()=>{if(currentCall)callDataConn=conn;});});
  peer.on('call',call=>{
    incomingCallObj=call;
    const m=call.metadata||{};
    document.getElementById('callerInfo').textContent=`${m.name||'不明'} から通話リクエストが届いています`;
    document.getElementById('incomingCall').classList.add('active');
    playIncomingSound();
  });
  peer.on('error',e=>{
    if((e.type==='server-error'||e.type==='network')&&idx+1<PEER_CONFIGS.length){peer.destroy();initPeer(idx+1);}
    else addSys('接続エラー: '+e.type);
  });
}

}
async function fetchLobby(){
  try{
    const cutoff=new Date(Date.now()-TIMEOUT).toISOString();
    const rows=await sbSelect('lobby',`updated_at=gte.${cutoff}&order=updated_at.desc`);
    document.getElementById('onlineCount').textContent=rows.length;
    renderOnline(rows);
    rows.forEach(r=>{if(r.peer_id!==myPeerId&&!dataConns[r.peer_id])openDataConn(r.peer_id);});
  }catch(e){}
}

// ===== DATA CONN =====
function openDataConn(tid){
  if(dataConns[tid]||tid===myPeerId)return;
  const conn=peer.connect(tid,{metadata:{name:myName,color:myColor},reliable:true});
  conn.on('open',()=>{dataConns[tid]=conn;});
  setupConn(conn);
}
function setupConn(conn){
  conn.on('open',()=>{dataConns[conn.peer]=conn;});
  conn.on('data',d=>onData(d,conn));
  conn.on('close',()=>{delete dataConns[conn.peer];if(callDataConn===conn)callDataConn=null;});
  conn.on('error',()=>{delete dataConns[conn.peer];if(callDataConn===conn)callDataConn=null;});
}
function onData(d,conn){
  if(d.type==='callChat'){addCallMsg({...d,mine:false});playMsgSound();}
  else if(d.type==='reaction'){showReaction(d.emoji,d.name,false);playReactionSound(d.emoji);}
  else if(d.type==='callTyping'){showCallTyping(d.name);}
  else if(d.type==='globalTyping'){showGlobalTyping(d.name);}
  else if(d.type==='msgDeleted'){markDeleted(d.msgId);}
}

    const av=document.createElement('div');renderAvatar(av,u.color||0,u.emoji||'',u.avatar_url||'',u.name,36);wrap.appendChild(av);
    const info=document.createElement('div');info.className='uinfo';
    info.innerHTML=`<div class="uname">${esc(u.name)}</div><div class="ustatus">${isMe?'あなた':'オンライン'}</div>`;
    wrap.appendChild(info);
    if(isMe){const t=document.createElement('span');t.className='youTag';t.textContent='あなた';wrap.appendChild(t);}
    else{const b=document.createElement('button');b.className='callBtn';b.textContent='📞 通話';b.onclick=()=>callUser(u.peer_id,u.name);wrap.appendChild(b);}
    list.appendChild(wrap);
  });
}

// ===== GLOBAL CHAT =====
function onMsgKey(e){if(e.key==='Enter')sendMsg();}
function onTyping(){
  if(!isTyping){isTyping=true;broadcast({type:'globalTyping',name:myName});}
  clearTimeout(typingTimer);typingTimer=setTimeout(()=>{isTyping=false;},2000);
}
function showGlobalTyping(name){
  const el=document.getElementById('typingIndicator');el.textContent=`${name} が入力中...`;
  clearTimeout(el._t);el._t=setTimeout(()=>el.textContent='',2500);
}

// ===== CHAT IMAGE =====
function onChatImgSelect(e){
  const f=e.target.files[0];if(!f)return;
  pendingImgFile=f;pendingImgDataUrl=URL.createObjectURL(f);
  document.getElementById('imgPreviewThumb').src=pendingImgDataUrl;
  document.getElementById('imgPreviewBar').classList.add('active');
  e.target.value='';
}
function clearPendingImg(){
  pendingImgFile=null;pendingImgDataUrl='';
  document.getElementById('imgPreviewBar').classList.remove('active');
  document.getElementById('imgPreviewThumb').src='';
}
function openImgOverlay(src){document.getElementById('overlayImg').src=src;document.getElementById('imgOverlay').classList.add('active');}

async function uploadImageToStorage(file){
  const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
  const path=`${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const buf=await file.arrayBuffer();
  await axios.post(`${SB_URL}/storage/v1/object/chat-images/${path}`,buf,
    {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type||'image/jpeg','x-upsert':'true'}});
  return `${SB_URL}/storage/v1/object/public/chat-images/${path}`;
}

async function sendMsg(){
  const inp=document.getElementById('msgInput');
  const txt=inp.value.trim();
  if(!txt&&!pendingImgFile)return;
  inp.value='';isTyping=false;
  const file=pendingImgFile,localPreview=pendingImgDataUrl;
  clearPendingImg();
  renderMsg({name:myName,color:myColor,avatar_url:myAvatarDataUrl,text:txt,image_url:localPreview||null,mine:true,created_at:new Date().toISOString(),id:'tmp_'+Date.now()},true);
  try{
    let imgUrl=null;
    if(file)imgUrl=await uploadImageToStorage(file);
    await sbUpsert('messages',{peer_id:myPeerId,user_id:myId,name:myName,color:myColor,text:txt||null,image_url:imgUrl||null,deleted:false});
  }catch(e){addSys('送信失敗: '+e.message);}
}

async function fetchMessages(){
  try{
    let q='order=created_at.asc&limit=100';
    if(lastMsgTime)q+=`&created_at=gt.${encodeURIComponent(lastMsgTime)}`;
    const rows=await sbSelect('messages',q);
    rows.forEach(r=>{
      if(r.peer_id===myPeerId)return;
      const atBottom=isAtBottom('chatMessages');
      renderMsg({...r,mine:false},atBottom);
      if(isInCall){unreadCount++;document.getElementById('unreadBadge').textContent=unreadCount;document.getElementById('unreadBadge').style.display='inline';}
      playMsgSound();
    });
    if(rows.length>0)lastMsgTime=rows[rows.length-1].created_at;
    // 削除済みメッセージの反映
    await syncDeleted();
  }catch(e){}
}

async function syncDeleted(){
  try{
    const rows=await sbSelect('messages','deleted=eq.true&order=created_at.desc&limit=50');
    rows.forEach(r=>markDeleted(r.id));
  }catch(e){}
}

function renderMsg(msg,scroll){
  if(msg.deleted){renderDeletedMsg(msg.id);return;}
  const box=document.getElementById('chatMessages');
  // 自分のメッセージかどうかをuser_idで判定
  const isMine = msg.user_id === myId || msg.peer_id === myPeerId || msg.mine === true;
  wrap.dataset.msgId=msg.id||'';
  const av=document.createElement('div');renderAvatar(av,msg.color||0,msg.emoji||'',msg.avatar_url||'',msg.name,30);wrap.appendChild(av);
  const t=msg.created_at?new Date(msg.created_at).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}):nowStr();
  const inner=document.createElement('div');
  let content='';
  if(msg.text)content+=`<div>${esc(msg.text)}</div>`;
  if(msg.image_url)content+=`<img src="${msg.image_url}" onclick="openImgOverlay('${msg.image_url.replace(/'/g,"\\'")}')">`;
  const delBtn=isMine?`<button class="deleteBtn" data-msg-id="${msg.id}" title="削除">🗑️</button>`:'';
  inner.innerHTML=`<div class="msgBubble">${content}</div><div class="msgMeta">${isMine?'':esc(msg.name)+' · '}${t}${delBtn}</div>`;
  wrap.appendChild(inner);
  box.appendChild(wrap);
  if(scroll)box.scrollTop=box.scrollHeight;
}

function renderDeletedMsg(id){
  // 既存要素を削除済み表示に差し替え
  const el=document.querySelector(`[data-msg-id="${id}"]`);
  if(el){
    el.querySelectorAll('.msgBubble').forEach(b=>{b.innerHTML='<span class="deletedMsg">🗑️ このメッセージは削除されました</span>';});
    el.querySelectorAll('.deleteBtn').forEach(b=>b.remove());
  }
}
function markDeleted(id){renderDeletedMsg(id);}

// ===== DELETE =====
function askDelete(id){
  console.log('askDelete called, id=',id);
  pendingDeleteId=id;
  document.getElementById('deleteConfirm').classList.add('active');
}
function closeDeleteConfirm(){pendingDeleteId=null;document.getElementById('deleteConfirm').classList.remove('active');}
async function confirmDelete(){
  if(!pendingDeleteId){closeDeleteConfirm();return;}
  const id=pendingDeleteId;closeDeleteConfirm();
  try{
    console.log('削除試行 id=',id);
    const res=await axios.patch(
      `${SB_URL}/rest/v1/messages?id=eq.${id}`,
      {deleted:true},
      {headers:{
        'apikey':SB_KEY,
        'Authorization':'Bearer '+SB_KEY,
        'Content-Type':'application/json',
        'Prefer':'return=minimal'
      }}
    );
    console.log('削除成功',res.status);
    markDeleted(id);
    broadcast({type:'msgDeleted',msgId:id});
  }catch(e){
    console.error('削除エラー',e.response?.status, e.response?.data, e.message);
    addSys('削除に失敗しました: '+JSON.stringify(e.response?.data||e.message));
  }
}

function addSys(txt){
  const box=document.getElementById('chatMessages');
  const d=document.createElement('div');d.className='systemMsg';d.textContent=txt;
  box.appendChild(d);box.scrollTop=box.scrollHeight;
}

// ===== IN-CALL CHAT =====
function onCallTyping(){
  const conn=callDataConn||Object.values(dataConns)[0];
  if(conn)try{conn.send({type:'callTyping',name:myName});}catch(e){}
}
function showCallTyping(name){
  const el=document.getElementById('callChatTyping');el.textContent=`${name} が入力中...`;
  clearTimeout(el._t);el._t=setTimeout(()=>el.textContent='',2500);
}
function onCallImgSelect(e){
  const f=e.target.files[0];if(!f)return;e.target.value='';
  const local=URL.createObjectURL(f);
  addCallMsg({name:myName,color:myColor,text:'',image_url:local,mine:true});
  uploadImageToStorage(f).then(url=>{
    const conn=callDataConn||Object.values(dataConns)[0];
    if(conn)try{conn.send({type:'callChat',name:myName,color:myColor,text:'',image_url:url});}catch(e){}
  }).catch(()=>addSys('画像送信失敗'));
}
function sendCallMsg(){
  const inp=document.getElementById('callMsgInput');
  const txt=inp.value.trim();if(!txt)return;inp.value='';
  addCallMsg({name:myName,color:myColor,text:txt,mine:true});
  const conn=callDataConn||Object.values(dataConns)[0];
  if(conn)try{conn.send({type:'callChat',name:myName,color:myColor,text:txt});}catch(e){}
}
function addCallMsg(msg){
  const box=document.getElementById('callChatMsgs');
  const d=document.createElement('div');d.className='callMsg'+(msg.mine?' mine':'');
  let html=msg.mine?'':'<div class="cmName">'+esc(msg.name)+'</div>';
  if(msg.text)html+=esc(msg.text);
  if(msg.image_url)html+=`<br><img src="${msg.image_url}" style="max-width:180px;max-height:160px;border-radius:8px;margin-top:4px;cursor:pointer" onclick="openImgOverlay('${msg.image_url.replace(/'/g,"\\'")}')">`;
  d.innerHTML=html;box.appendChild(d);box.scrollTop=box.scrollHeight;
}

// ===== REACTIONS =====
function toggleEmojiPicker(){document.getElementById('emojiPicker').classList.toggle('open');}
function startReaction(emoji){
  reactionActive=true;fireReaction(emoji);
  reactionInterval=setInterval(()=>{if(reactionActive)fireReaction(emoji);},200);
}
function stopReaction(){reactionActive=false;clearInterval(reactionInterval);reactionInterval=null;}
function fireReaction(emoji){
  showReaction(emoji,myName,true);playReactionSound(emoji);
  const conn=callDataConn||Object.values(dataConns)[0];
  if(conn)try{conn.send({type:'reaction',emoji,name:myName});}catch(e){}
}
function showReaction(emoji,senderName,isMine){
  const modal=document.getElementById('videoModal');const rect=modal.getBoundingClientRect();
  const el=document.createElement('div');el.className='reaction';
  el.innerHTML=`<div class="emoji">${emoji}</div><div class="rname">${esc(senderName)}</div>`;
  el.style.left=(rect.left+rect.width*0.08+Math.random()*rect.width*0.55)+'px';
  el.style.top=(rect.top+rect.height*0.70)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),2100);
}

// ===== PROFILE =====
function openProfile(){
  document.getElementById('profileName').value=myName;
  profileAvatarDataUrl=myAvatarDataUrl;
  buildColorPicker('profileColorPicker',myColor,'updatePreview()');
  buildEmojiPicker('profileEmojiPicker',myEmoji,'updatePreview()');
  if(myAvatarDataUrl){
    const p=document.getElementById('profileAvatarPreview');p.src=myAvatarDataUrl;p.style.display='block';
    document.getElementById('profileImgPlaceholder').style.display='none';
    document.getElementById('profileClearImg').style.display='block';
  }else{
    document.getElementById('profileAvatarPreview').style.display='none';
    document.getElementById('profileImgPlaceholder').style.display='flex';
    document.getElementById('profileClearImg').style.display='none';
  }
  updatePreview();document.getElementById('profileModal').classList.add('active');
}
function closeProfile(){document.getElementById('profileModal').classList.remove('active');}
function updatePreview(){
  const name=document.getElementById('profileName').value||myName;
  const color=parseInt(getRadio('profileColorPicker')||'0');
  const emoji=getRadio('profileEmojiPicker')||'';
  document.getElementById('previewName').textContent=name;
  const av=document.getElementById('previewAvatar');
  av.style.cssText='width:60px;height:60px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0';
  renderAvatar(av,color,emoji,profileAvatarDataUrl,name||'?',60);
}
async function saveProfile(){
  const name=document.getElementById('profileName').value.trim();
  if(!name){alert('ニックネームを入力してください');return;}
  myName=name;myColor=parseInt(getRadio('profileColorPicker')||'0');
  myEmoji=getRadio('profileEmojiPicker')||'';myAvatarDataUrl=profileAvatarDataUrl;
  updateTopBar();closeProfile();saveLocal();
  await registerMe();addSys('✅ プロフィールを更新しました');
}

// ===== VIDEO =====
async function getStream(){if(!localStream)localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});return localStream;}
function startDurationTimer(){
  callStartTime=Date.now();
  durationTimer=setInterval(()=>{
    const s=Math.floor((Date.now()-callStartTime)/1000);
    document.getElementById('callDuration').textContent=`⏱ ${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  },1000);
}
async function callUser(tid,tname){
  try{
    const stream=await getStream();
    document.getElementById('localVideo').srcObject=stream;
    document.getElementById('localLabel').textContent=myName;
    document.getElementById('remoteLabel').textContent=tname;
    document.getElementById('callStatus').textContent=`${tname} に発信中...`;
    document.getElementById('callChatMsgs').innerHTML='';
    document.getElementById('videoModal').classList.add('active');
    isInCall=true;unreadCount=0;document.getElementById('unreadBadge').style.display='none';
    const call=peer.call(tid,stream,{metadata:{name:myName,color:myColor}});
    currentCall=call;
    setTimeout(()=>{if(!callDataConn){const conn=peer.connect(tid,{reliable:true});conn.on('open',()=>{callDataConn=conn;dataConns[tid]=conn;});setupConn(conn);}},500);
    call.on('stream',r=>{document.getElementById('remoteVideo').srcObject=r;document.getElementById('callStatus').textContent=`${tname} と通話中 🟢`;playConnectSound();startDurationTimer();});
    call.on('close',()=>endCall());call.on('error',()=>{addSys('通話エラー');endCall();});
  }catch(e){alert('カメラ・マイクのアクセスを許可してください');document.getElementById('videoModal').classList.remove('active');}
}
async function acceptCall(){
  document.getElementById('incomingCall').classList.remove('active');
  try{
    const stream=await getStream();
    document.getElementById('localVideo').srcObject=stream;
    const m=incomingCallObj.metadata||{};
    document.getElementById('localLabel').textContent=myName;
    document.getElementById('remoteLabel').textContent=m.name||'相手';
    document.getElementById('callStatus').textContent=`${m.name||'相手'} と通話中 🟢`;
    document.getElementById('callChatMsgs').innerHTML='';
    document.getElementById('videoModal').classList.add('active');
    isInCall=true;unreadCount=0;
    incomingCallObj.answer(stream);currentCall=incomingCallObj;
    incomingCallObj.on('stream',r=>{document.getElementById('remoteVideo').srcObject=r;playConnectSound();startDurationTimer();});
    incomingCallObj.on('close',()=>endCall());
  }catch(e){alert('カメラ・マイクのアクセスを許可してください');}
}
function rejectCall(){document.getElementById('incomingCall').classList.remove('active');incomingCallObj=null;}
function endCall(){
  if(currentCall){currentCall.close();currentCall=null;}
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  if(screenStream){screenStream.getTracks().forEach(t=>t.stop());screenStream=null;}
  if(durationTimer){clearInterval(durationTimer);durationTimer=null;}
  stopReaction();callDataConn=null;isInCall=false;screenOn=false;
  document.getElementById('localVideo').srcObject=null;document.getElementById('remoteVideo').srcObject=null;
  document.getElementById('videoModal').classList.remove('active');
  document.getElementById('localBox').classList.remove('screen-share');
  document.getElementById('callDuration').textContent='';
  micOn=true;camOn=true;
  ['micBtn','camBtn','screenBtn'].forEach(id=>document.getElementById(id).className='ctrlBtn on');
  document.getElementById('micBtn').textContent='🎤';document.getElementById('camBtn').textContent='📹';document.getElementById('screenBtn').textContent='🖥️';
}
function toggleMic(){if(!localStream)return;micOn=!micOn;localStream.getAudioTracks().forEach(t=>t.enabled=micOn);document.getElementById('micBtn').textContent=micOn?'🎤':'🔇';document.getElementById('micBtn').className='ctrlBtn '+(micOn?'on':'off');}
function toggleCam(){if(!localStream)return;camOn=!camOn;localStream.getVideoTracks().forEach(t=>t.enabled=camOn);document.getElementById('camBtn').textContent=camOn?'📹':'🚫';document.getElementById('camBtn').className='ctrlBtn '+(camOn?'on':'off');}
async function toggleScreen(){
  if(!screenOn){
    try{
      screenStream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
      const track=screenStream.getVideoTracks()[0];
      if(currentCall&&currentCall.peerConnection){const s=currentCall.peerConnection.getSenders().find(s=>s.track&&s.track.kind==='video');if(s)s.replaceTrack(track);}
      document.getElementById('localVideo').srcObject=screenStream;
      document.getElementById('localBox').classList.add('screen-share');
      document.getElementById('localLabel').textContent='🖥️ 画面共有中';
      screenOn=true;document.getElementById('screenBtn').className='ctrlBtn active';
      track.onended=()=>stopScreen();
    }catch(e){if(e.name!=='NotAllowedError')alert('画面共有に失敗しました');}
  }else{stopScreen();}
}
async function stopScreen(){
  if(screenStream){screenStream.getTracks().forEach(t=>t.stop());screenStream=null;}
  screenOn=false;document.getElementById('screenBtn').className='ctrlBtn on';
  try{const stream=await getStream();const track=stream.getVideoTracks()[0];if(currentCall&&currentCall.peerConnection){const s=currentCall.peerConnection.getSenders().find(s=>s.track&&s.track.kind==='video');if(s)s.replaceTrack(track);}document.getElementById('localVideo').srcObject=stream;document.getElementById('localBox').classList.remove('screen-share');document.getElementById('localLabel').textContent=myName;}catch(e){}
}

// ===== INIT =====
document.addEventListener('click',e=>{
  const p=document.getElementById('emojiPicker');
  if(p.classList.contains('open')&&!e.target.closest('.emojiPickerWrap'))p.classList.remove('open');
  const pm=document.getElementById('profileModal');
  if(pm.classList.contains('active')&&e.target===pm)closeProfile();
});
window.addEventListener('beforeunload',()=>{
  clearInterval(heartbeatTimer);clearInterval(refreshTimer);clearInterval(msgTimer);
  try{sbDelete('lobby',`peer_id=eq.${myPeerId}`);}catch(e){}
});

// usersテーブルにpin_hashカラムがなければSQL追加が必要なためチェック
checkAutoLogin();
