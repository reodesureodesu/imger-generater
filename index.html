<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 画像生成</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 16px 60px;
  }
  h1 { font-size: 26px; font-weight: 800; color: #7c6af7; margin-bottom: 6px; letter-spacing: 1px; }
  .subtitle { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 30px; }
  .card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 24px;
    width: 100%; max-width: 680px;
    margin-bottom: 20px;
  }
  .card-title { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 6px; }
  textarea, input[type=text], input[type=password], input[type=number], select {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 10px 13px;
    color: #f0f0f0;
    font-size: 13.5px;
    font-family: inherit;
    outline: none;
    resize: none;
    transition: border 0.2s;
  }
  textarea:focus, input:focus, select:focus { border-color: #7c6af7; }
  select option { background: #1a1740; }
  input[type=range] { width: 100%; accent-color: #7c6af7; cursor: pointer; }
  .row { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
  .col { flex: 1; min-width: 140px; }
  .col-sm { flex: 0 0 120px; }
  .field { margin-top: 14px; }
  .seed-row { display: flex; gap: 8px; align-items: flex-end; }
  .seed-row input { flex: 1; }
  .seed-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: #f0f0f0;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .seed-btn:hover { background: rgba(255,255,255,0.18); }
  .toggle-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    cursor: pointer;
    padding: 0;
    margin-left: 6px;
  }
  .collapsible { overflow: hidden; transition: max-height 0.3s ease; }
  .steps-val { font-size: 12px; color: #7c6af7; margin-left: 8px; }
  .btn {
    margin-top: 20px;
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #7c6af7, #6c5ce7);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.5px;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:hover:not(:disabled) { opacity: 0.88; }
  #status {
    font-size: 13px; color: rgba(255,255,255,0.5);
    text-align: center; min-height: 20px; margin-top: 12px;
  }
  .progress-bar-wrap {
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    margin-top: 10px;
    overflow: hidden;
    display: none;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #7c6af7, #a78bfa);
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }
  /* Grid results */
  #resultGrid {
    width: 100%; max-width: 680px;
    display: none;
    flex-direction: column;
    gap: 16px;
  }
  .grid-imgs {
    display: grid;
    gap: 10px;
  }
  .grid-imgs.n1 { grid-template-columns: 1fr; }
  .grid-imgs.n2 { grid-template-columns: 1fr 1fr; }
  .grid-imgs.n4 { grid-template-columns: 1fr 1fr; }
  .img-wrap {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in; }
  .img-wrap .overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    padding: 10px 12px 8px;
    font-size: 11px; color: rgba(255,255,255,0.6);
    display: flex; justify-content: space-between; align-items: center;
  }
  .img-wrap .dl-icon {
    background: rgba(255,255,255,0.15);
    border: none; border-radius: 7px;
    color: #fff; padding: 4px 9px; cursor: pointer; font-size: 12px;
    text-decoration: none;
  }
  .img-wrap .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(124,106,247,0.3);
    border-top-color: #7c6af7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .meta-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.8;
  }
  /* Lightbox */
  #lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); z-index: 999;
    align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  #lightbox.active { display: flex; }
  #lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 12px; }
  /* History */
  .section-title { width: 100%; max-width: 680px; font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 24px; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
  .history-grid { width: 100%; max-width: 680px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .history-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.2s; }
  .history-grid img:hover { transform: scale(1.06); }
</style>
</head>
<body>

<h1>✦ AI 画像生成</h1>
<p class="subtitle">Pollinations.ai + Google翻訳 / Claude API — ローカル実行用</p>

<!-- Main Settings -->
<div class="card">
  <div class="card-title">🔑 API設定（任意）</div>
  <label>Anthropic APIキー — 入力するとClaudeでプロンプトを最適化</label>
  <input type="password" id="apiKey" placeholder="sk-ant-... （空でもGoogle翻訳を使用）" />
</div>

<div class="card">
  <div class="card-title">🎨 プロンプト</div>
  <label>画像の説明（日本語OK）</label>
  <textarea id="prompt" rows="3" placeholder="例: 夕暮れの富士山、桜が舞う、幻想的な雰囲気"></textarea>

  <div class="field">
    <label>ネガティブプロンプト（除外したいもの）</label>
    <textarea id="negPrompt" rows="2" placeholder="例: blurry, low quality, watermark, text, ugly, deformed"></textarea>
  </div>
</div>

<div class="card">
  <div class="card-title">⚙️ 生成設定</div>
  <div class="row">
    <div class="col">
      <label>枚数</label>
      <select id="count">
        <option value="1">1枚</option>
        <option value="2">2枚</option>
        <option value="4" selected>4枚</option>
      </select>
    </div>
    <div class="col">
      <label>サイズ</label>
      <select id="size">
        <option value="512x512" selected>512 × 512</option>
        <option value="768x512">768 × 512（横長）</option>
        <option value="512x768">512 × 768（縦長）</option>
        <option value="1024x1024">1024 × 1024（高解像度）</option>
        <option value="1280x720">1280 × 720（16:9）</option>
      </select>
    </div>
    <div class="col">
      <label>モデル</label>
      <select id="model">
        <option value="flux" selected>Flux（高品質）</option>
        <option value="flux-realism">Flux Realism</option>
        <option value="flux-anime">Flux Anime</option>
        <option value="flux-3d">Flux 3D</option>
        <option value="turbo">Turbo（高速）</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div class="col">
      <label>スタイル追加</label>
      <select id="style">
        <option value="">なし</option>
        <option value="photorealistic, 8k, sharp focus, professional photography">フォトリアル</option>
        <option value="watercolor painting, soft colors, artistic">水彩画</option>
        <option value="anime style, vibrant colors, detailed">アニメ</option>
        <option value="oil painting, impressionist, textured">油絵</option>
        <option value="pixel art, retro game style, 16bit">ピクセルアート</option>
        <option value="pencil sketch, black and white, detailed lines">鉛筆スケッチ</option>
        <option value="cinematic, dramatic lighting, film grain">シネマティック</option>
        <option value="concept art, fantasy, highly detailed, artstation">コンセプトアート</option>
        <option value="minimalist, clean, flat design">ミニマル</option>
      </select>
    </div>
    <div class="col-sm">
      <label>画質</label>
      <select id="quality">
        <option value="medium">標準</option>
        <option value="high" selected>高品質</option>
      </select>
    </div>
  </div>

  <!-- Seed -->
  <div class="field">
    <label>シード値 <span style="color:rgba(255,255,255,0.3)">（同じ値で再現可能・-1でランダム）</span></label>
    <div class="seed-row">
      <input type="number" id="seed" value="-1" min="-1" max="999999" />
      <button class="seed-btn" onclick="randomSeed()">🎲 ランダム</button>
      <button class="seed-btn" onclick="document.getElementById('seed').value=-1">↺ リセット</button>
    </div>
  </div>

  <!-- Enhance toggle -->
  <div class="field" style="display:flex;align-items:center;gap:10px;margin-top:16px">
    <input type="checkbox" id="enhance" style="width:auto;accent-color:#7c6af7;cursor:pointer" />
    <label style="margin:0;cursor:pointer" for="enhance">✨ プロンプト自動強化（Pollinations.ai enhance）</label>
  </div>

  <button class="btn" id="genBtn" onclick="generate()">🎨 画像を生成する</button>
  <div id="status"></div>
  <div class="progress-bar-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
</div>

<!-- Results -->
<div id="resultGrid">
  <div class="grid-imgs n4" id="imgGrid"></div>
  <div class="meta-card" id="metaInfo"></div>
</div>

<!-- History -->
<div class="section-title" id="histLabel" style="display:none">📁 履歴（クリックで拡大）</div>
<div class="history-grid" id="historyGrid"></div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lbImg" src="" alt="" />
</div>

<script>
const history = [];

function randomSeed() {
  document.getElementById('seed').value = Math.floor(Math.random() * 999999);
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function setProgress(pct) {
  const wrap = document.getElementById('progressWrap');
  const bar = document.getElementById('progressBar');
  wrap.style.display = 'block';
  bar.style.width = pct + '%';
  if (pct >= 100) setTimeout(() => { wrap.style.display = 'none'; bar.style.width = '0%'; }, 600);
}

function openLightbox(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

async function translateWithGoogle(text) {
  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=en&dt=t&q=${encodeURIComponent(text)}`;
  const res = await fetch(url);
  const data = await res.json();
  return data[0].map(s => s[0]).join('');
}

async function getEngPrompt(promptJa, apiKey) {
  if (apiKey) {
    try {
      setStatus('🤖 Claudeでプロンプトを最適化中…');
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 200,
          system: 'Convert the user\'s image generation request into an optimal English prompt for Stable Diffusion. Output only the prompt, no explanation.',
          messages: [{ role: 'user', content: promptJa }]
        })
      });
      const data = await res.json();
      return data.content?.[0]?.text?.trim() || promptJa;
    } catch {
      setStatus('⚠️ Claude失敗。Google翻訳を使用します…');
    }
  }
  try {
    setStatus('🌐 Google翻訳でプロンプトを変換中…');
    return await translateWithGoogle(promptJa);
  } catch {
    return promptJa;
  }
}

function buildUrl(engPrompt, negPrompt, w, h, seed, model, quality, enhance) {
  const s = seed === -1 ? Math.floor(Math.random() * 999999) : seed;
  const neg = negPrompt ? encodeURIComponent(negPrompt) : '';
  let url = `https://image.pollinations.ai/prompt/${encodeURIComponent(engPrompt)}?width=${w}&height=${h}&seed=${s}&model=${model}&quality=${quality}&nologo=true`;
  if (neg) url += `&negative_prompt=${neg}`;
  if (enhance) url += `&enhance=true`;
  return { url, seed: s };
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function generate() {
  const apiKey  = document.getElementById('apiKey').value.trim();
  const promptJa = document.getElementById('prompt').value.trim();
  const negPrompt = document.getElementById('negPrompt').value.trim();
  const count   = parseInt(document.getElementById('count').value);
  const size    = document.getElementById('size').value;
  const model   = document.getElementById('model').value;
  const style   = document.getElementById('style').value;
  const quality = document.getElementById('quality').value;
  const seedVal = parseInt(document.getElementById('seed').value);
  const enhance = document.getElementById('enhance').checked;

  if (!promptJa) { setStatus('⚠️ 画像の説明を入力してください'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  setProgress(0);

  // Translate / optimize
  let engPrompt = await getEngPrompt(promptJa, apiKey);
  if (style) engPrompt = `${engPrompt}, ${style}`;
  const [w, h] = size.split('x');

  // Setup grid
  const grid = document.getElementById('imgGrid');
  grid.className = `grid-imgs n${count}`;
  grid.innerHTML = '';
  const resultGrid = document.getElementById('resultGrid');
  resultGrid.style.display = 'flex';

  // Placeholders
  const slots = [];
  for (let i = 0; i < count; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'img-wrap';
    wrap.innerHTML = '<div class="spinner"></div>';
    grid.appendChild(wrap);
    slots.push(wrap);
  }

  const seeds = [];
  let done = 0;

  for (let i = 0; i < count; i++) {
    if (i > 0) {
      // 5秒インターバル
      for (let t = 5; t > 0; t--) {
        setStatus(`⏳ 次の画像まで ${t} 秒待機中… (${i}/${count} 完了)`);
        await sleep(1000);
      }
    }
    setStatus(`🎨 ${i + 1} / ${count} 枚目を生成中…`);

    const { url, seed: usedSeed } = buildUrl(engPrompt, negPrompt, w, h, seedVal, model, quality, enhance);
    seeds.push(usedSeed);

    await new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        slots[i].innerHTML = `
          <img src="${url}" onclick="openLightbox('${url}')" />
          <div class="overlay">
            <span>seed: ${usedSeed}</span>
            <a class="dl-icon" href="${url}" download="gen_${usedSeed}.jpg" onclick="event.stopPropagation()">⬇️</a>
          </div>`;
        done++;
        setProgress(Math.round((done / count) * 100));
        resolve();
      };
      img.onerror = () => {
        slots[i].innerHTML = `<div style="color:rgba(255,255,255,0.4);font-size:12px;padding:12px">❌ 失敗</div>`;
        done++;
        setProgress(Math.round((done / count) * 100));
        resolve();
      };
      img.src = url;
    });

    addHistory(url, usedSeed);
  }

  document.getElementById('metaInfo').innerHTML =
    `<b>プロンプト:</b> ${engPrompt}${negPrompt ? `<br><b>ネガティブ:</b> ${negPrompt}` : ''}<br>` +
    `<b>モデル:</b> ${model} / <b>サイズ:</b> ${w}×${h} / <b>品質:</b> ${quality}<br>` +
    `<b>Seeds:</b> ${seeds.join(', ')}`;

  setStatus('✅ 生成完了！');
  btn.disabled = false;
}

function addHistory(url, seed) {
  history.unshift({ url, seed });
  const grid = document.getElementById('historyGrid');
  document.getElementById('histLabel').style.display = 'block';
  grid.innerHTML = history.slice(0, 12).map(h =>
    `<img src="${h.url}" title="seed: ${h.seed}" onclick="openLightbox('${h.url}')" />`
  ).join('');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) generate();
});
</script>
</body>
</html>
